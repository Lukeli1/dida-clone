name: Release Windows

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: Release notes shown in GitHub Releases and the updater
        required: true
        default: Validate the signed updater flow from v1.45.2 to v1.45.3

permissions:
  contents: write

concurrency:
  group: release-windows
  cancel-in-progress: false

jobs:
  release:
    name: Build, sign, and publish Windows updater
    runs-on: windows-latest

    steps:
      - name: Require main branch
        if: github.ref != 'refs/heads/main'
        shell: bash
        run: |
          echo "Run this workflow from the main branch."
          exit 1

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Verify versions
        run: npm run check:version

      - name: Verify signing secrets
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw 'Missing TAURI_SIGNING_PRIVATE_KEY repository secret.'
          }

      - name: Build and publish release
        id: tauri
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          tagName: v__VERSION__
          releaseName: v__VERSION__
          releaseBody: ${{ inputs.release_notes }}
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          retryAttempts: 2

      - name: Sync updater manifest to main
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(node -p "require('./package.json').version")
          rm -f latest.json
          gh release download "v${version}" --pattern latest.json --dir .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest.json
          if git diff --cached --quiet; then
            echo "latest.json is already current."
          else
            git commit -m "chore: update updater manifest for v${version}"
            git push origin HEAD:main
          fi
