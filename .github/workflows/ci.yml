# CI 已关闭自动触发（个人使用场景，避免每次 push 刷失败邮件）。
# 如需临时跑一遍，可在 GitHub Actions 页面手动 Run workflow。
# 若要恢复自动检查，把下面 on 改回 push/pull_request 即可。
name: CI

on:
  workflow_dispatch:

jobs:
  # ============ 前端：ESLint + Prettier + tsc + test + build ============
  frontend:
    name: Frontend (lint + format + typecheck + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: TypeScript check
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

  # ============ Rust：fmt + clippy + test + check ============
  rust:
    name: Rust (fmt + clippy + test + check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Rustfmt
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        working-directory: src-tauri
        run: cargo test

      - name: Check
        working-directory: src-tauri
        run: cargo check
